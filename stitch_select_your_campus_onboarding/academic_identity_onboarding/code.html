<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Step 1: Academic Identity</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#138aec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex justify-center">
<div class="relative flex h-auto min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<header class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Academic Identity</h2>
</header>
<div class="flex w-full flex-row items-center justify-center gap-3 py-5">
<div class="h-2 w-8 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<main class="px-6 flex-1">
<div class="space-y-1 mb-6">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Let's set up your profile</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Tell us where you study and your academic background.</p>
</div>
<section class="space-y-6 pb-20">
<!-- Primary Campus -->
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-bold tracking-tight">Primary Campus</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-100 dark:bg-slate-800 border-none rounded-xl focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100" placeholder="Search your university..." type="text"/>
</div>
</div>
<!-- Secondary Campuses -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-slate-900 dark:text-slate-100 text-sm font-bold tracking-tight">Alma Mater / Other Campuses</label>
<span class="text-xs text-slate-500">Up to 2</span>
</div>
<div class="space-y-3">
<div class="flex items-center gap-2 p-3 bg-slate-100 dark:bg-slate-800 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-primary">add_circle</span>
<span class="text-sm font-medium text-slate-600 dark:text-slate-400">Add secondary campus</span>
</div>
</div>
</div>
<!-- Academic Details Grid -->
<div class="grid grid-cols-1 gap-4">
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-bold tracking-tight">Department</label>
<select class="w-full px-4 py-3 bg-slate-100 dark:bg-slate-800 border-none rounded-xl focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 appearance-none">
<option>Select Department</option>
<option>Engineering</option>
<option>Business &amp; Economics</option>
<option>Arts &amp; Humanities</option>
<option>Sciences</option>
</select>
</div>
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-bold tracking-tight">Course / Major</label>
<input class="w-full px-4 py-3 bg-slate-100 dark:bg-slate-800 border-none rounded-xl focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100" placeholder="e.g. Computer Science" type="text"/>
</div>
<div class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-bold tracking-tight">Batch Year</label>
<input class="w-full px-4 py-3 bg-slate-100 dark:bg-slate-800 border-none rounded-xl focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100" placeholder="2024" type="number"/>
</div>
</div>
<!-- Volunteer Nudge -->
<div class="p-4 bg-primary/10 border border-primary/20 rounded-xl flex items-start gap-4">
<div class="size-10 bg-primary text-white flex items-center justify-center rounded-lg shrink-0">
<span class="material-symbols-outlined">volunteer_activism</span>
</div>
<div>
<h4 class="text-slate-900 dark:text-slate-100 text-sm font-bold">Become a Campus Leader</h4>
<p class="text-slate-600 dark:text-slate-400 text-xs mt-1 leading-relaxed">Interested in representing your campus? Help us organize events and grow the community.</p>
<button class="mt-2 text-primary text-xs font-bold flex items-center gap-1">
                            Learn more <span class="material-symbols-outlined text-sm">chevron_right</span>
</button>
</div>
</div>
</section>
</main>
<footer class="sticky bottom-0 bg-background-light dark:bg-background-dark p-6 border-t border-slate-200 dark:border-slate-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/25">
                Continue
            </button>
</footer>
</div>
</body></html>
