<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#138aec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Address Book Setup</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Address Book Setup</h2>
</div>
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 p-6">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Onboarding Progress</p>
<p class="text-primary text-sm font-bold leading-normal">2 of 3</p>
</div>
<div class="rounded-full bg-slate-200 dark:bg-slate-800 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 66%;"></div>
</div>
</div>
<!-- Header Section -->
<div class="px-6 py-4 text-center">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight pb-2">Where should we deliver?</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed max-w-sm mx-auto">Set your addresses now to make checkout faster and help us find your nearest Drop Host.</p>
</div>
<!-- Address List Section -->
<div class="flex flex-col gap-4 p-6">
<!-- Campus Address -->
<button class="flex items-center gap-4 bg-white dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-colors text-left group">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-14">
<span class="material-symbols-outlined text-3xl">school</span>
</div>
<div class="flex flex-col flex-1 justify-center">
<p class="text-slate-900 dark:text-slate-100 text-lg font-semibold leading-tight">Current Hostel / Campus</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal mt-1">Block, Room number, and Hostel name</p>
</div>
<div class="shrink-0 text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
<!-- Home Address -->
<button class="flex items-center gap-4 bg-white dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-colors text-left group">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-14">
<span class="material-symbols-outlined text-3xl">home</span>
</div>
<div class="flex flex-col flex-1 justify-center">
<p class="text-slate-900 dark:text-slate-100 text-lg font-semibold leading-tight">Permanent Home Address</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal mt-1">For vacations and direct shipments</p>
</div>
<div class="shrink-0 text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
<!-- Other/Gifting -->
<button class="flex items-center gap-4 bg-white dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-colors text-left group">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-14">
<span class="material-symbols-outlined text-3xl">card_giftcard</span>
</div>
<div class="flex flex-col flex-1 justify-center">
<p class="text-slate-900 dark:text-slate-100 text-lg font-semibold leading-tight">Other / Gifting</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal mt-1">Friends, family, or work address</p>
</div>
<div class="shrink-0 text-slate-400 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
</div>
<!-- Secondary Info -->
<div class="mt-auto p-6 space-y-6">
<div class="flex items-start gap-3 p-4 bg-primary/5 rounded-xl border border-primary/20">
<span class="material-symbols-outlined text-primary mt-0.5">info</span>
<p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">
                    Setting your <span class="font-semibold text-slate-900 dark:text-slate-100">Hostel/Campus</span> address helps us suggest the most convenient Drop Host points for your daily routine.
                </p>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20">
                    Continue
                </button>
<button class="w-full bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 font-medium py-3 rounded-xl transition-all">
                    I'll do this later
                </button>
</div>
</div>
<!-- Footer Spacer -->
<div class="h-8"></div>
</div>
</body></html>
