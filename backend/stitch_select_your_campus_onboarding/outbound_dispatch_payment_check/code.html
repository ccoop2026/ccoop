<html class="dark" lang="en"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Outbound Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scanner overlay styles */
        .scanner-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #137fec;
            border-width: 4px;
        }
        .top-left { top: 0; left: 0; border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0; }
        .top-right { top: 0; right: 0; border-left: 0; border-bottom: 0; border-radius: 0 12px 0 0; }
        .bottom-left { bottom: 0; left: 0; border-right: 0; border-top: 0; border-radius: 0 0 0 12px; }
        .bottom-right { bottom: 0; right: 0; border-left: 0; border-top: 0; border-radius: 0 0 12px 0; }
        
        /* Scanline animation */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: #137fec;
            box-shadow: 0 0 15px #137fec;
            animation: scan 2s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-4 py-4 bg-background-light dark:bg-background-dark z-20">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center text-slate-900 dark:text-white">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Outbound Dispatch</h1>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center h-10 w-10 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white transition-colors hover:bg-primary/20">
<span class="material-symbols-outlined text-xl">keyboard</span>
</button>
<button class="flex items-center justify-center h-10 w-10 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white transition-colors hover:bg-primary/20">
<span class="material-symbols-outlined text-xl">flash_on</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 relative flex flex-col w-full max-w-md mx-auto h-full">

<div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider mb-0.5">Today's Tally</p>
<div class="flex items-baseline gap-1.5">
<span class="text-slate-900 dark:text-white text-2xl font-bold">14</span>
<span class="text-slate-500 dark:text-slate-400 text-sm">items dispatched</span>
</div>
</div>
<div class="h-10 w-10 rounded-full bg-green-500/10 flex items-center justify-center">
<span class="material-symbols-outlined text-green-500 text-xl">inventory_2</span>
</div>
</div>
</div>
<!-- Scanner Viewfinder -->

<div class="relative z-10 w-64 h-64 border-0">
<div class="scanner-corner top-left"></div>
<div class="scanner-corner top-right"></div>
<div class="scanner-corner bottom-left"></div>
<div class="scanner-corner bottom-right"></div>
<div class="scan-line"></div>
</div>
<p class="relative z-10 mt-8 text-white/80 text-center font-medium px-6 py-2 bg-black/40 rounded-full backdrop-blur-sm text-sm">
                Align QR code or Barcode within frame
            </p>
<!-- Bottom Camera Controls -->
<div class="absolute bottom-6 flex items-center gap-8 z-10">
<button class="flex flex-col items-center gap-1 text-white/70 hover:text-white transition-colors">

<span class="material-symbols-outlined text-2xl">image</span>
</div>
<span class="text-xs font-medium">Gallery</span>
</button>
<button class="h-20 w-20 rounded-full border-4 border-white flex items-center justify-center bg-white/10 backdrop-blur-sm active:scale-95 transition-transform">
<div class="h-14 w-14 bg-white rounded-full"></div>
</button>
<button class="flex flex-col items-center gap-1 text-white/70 hover:text-white transition-colors">
<div class="h-12 w-12 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center border border-white/10">
<span class="material-symbols-outlined text-2xl">history</span>
</div>
<span class="text-xs font-medium">Recent</span>
</button>
</div>
</div>
<!-- Result Bottom Sheet (Conditional Display Simulation) -->
<div class="absolute bottom-0 left-0 right-0 z-30 transform transition-transform duration-300 translate-y-0">
<!-- Handle -->
<div class="mx-auto w-12 h-1.5 bg-white/20 rounded-full mb-2"></div>
<!-- Card Content -->
<div class="bg-background-light dark:bg-[#111418] rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.3)] border-t border-slate-200 dark:border-slate-700 overflow-hidden">
<!-- Success State Header -->
<div class="bg-green-500/10 border-b border-green-500/20 px-6 py-3 flex items-center gap-2">
<span class="material-symbols-outlined text-green-500 text-lg">check_circle</span>
<span class="text-green-600 dark:text-green-400 text-sm font-bold uppercase tracking-wide">Balance Paid: YES</span>
</div>
<div class="p-6">
<div class="flex items-start gap-4 mb-6">
<img class="w-16 h-16 rounded-full object-cover border-2 border-slate-200 dark:border-slate-600" data-alt="Profile picture of student Alex Johnson" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqP-D-rApuv143woVsuwrWJHHN6YaRbnVf_Mz9NBdeZIGJiNP0uV0iXORkf_MsjNBuVgjmksZ3l4ho9p8bQz9W4lUhpAiSn9kSIa2pRKG8LBQharQZjVHQBusKBe0ZdeMlr5YxWljneoudYUiIb14Wc0uuvxTwD-YIvQAG0VXirSH81pXbmZzhkCo9fzKc5D36C1i3ZJwtlVeWgTQC1Br09qsrheggXUiGVYFR7ne-DjQdzztjZQkEeuNFco3birw0YsJDTMf98qk"/>
<div class="flex-1">
<h3 class="text-slate-900 dark:text-white text-lg font-bold leading-tight">Alex Johnson</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Year 2 • Campus A</p>
<div class="mt-2 flex flex-wrap gap-2">
<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-300">
                                    #ORD-8921
                                </span>
</div>
</div>
</div>
<div class="bg-slate-100 dark:bg-[#1e2936] rounded-xl p-4 mb-6 border border-slate-200 dark:border-slate-700">
<h4 class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3">Order Details</h4>
<ul class="space-y-3">
<li class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="h-8 w-8 rounded bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-sm">checkroom</span>
</div>
<span class="text-slate-700 dark:text-slate-200 text-sm font-medium">1x Varsity Hoodie (L)</span>
</div>
<span class="material-symbols-outlined text-green-500 text-sm">check</span>
</li>
<li class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="h-8 w-8 rounded bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-sm">shopping_bag</span>
</div>
<span class="text-slate-700 dark:text-slate-200 text-sm font-medium">1x Tote Bag</span>
</div>
<span class="material-symbols-outlined text-green-500 text-sm">check</span>
</li>
</ul>
</div>
<div class="flex gap-3">
<button class="flex-1 h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg flex items-center justify-center gap-2 transition-colors shadow-lg shadow-primary/25">
<span class="material-symbols-outlined">send</span>
                            Confirm Dispatch
                        </button>
<button class="h-12 w-12 flex items-center justify-center rounded-lg border border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
</div>
</div>
</main>
