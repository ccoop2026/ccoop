<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ccoop.in | One account for all campuses</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#138aec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">ccoop.in</h2>
</div>
<!-- Hero Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden @[480px]:rounded-xl min-h-[240px] relative" data-alt="Modern university campus building with students walking around" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBgjYF6qZxrAAw4k4dxcwiJyxcm71nAsVzbFQF2_R4sOD4_2saE9fd4x8JuXSK_fdHK-TZrWQlTB2SiRVCkqTfmi9yMEnYpmCbM99QdwGLt9vh7Qw2xPRUPCWihQBnVT9-AoxclWw4bbbkYukWaHvGCnkXtG-BQ_YVoLhDOUCxIthYM8TnAFRgaDYwzFuST0CxISLKhKjSEcspeWmRyW1uk4Evlkrvjc6uvHDZkJwGfPgTKDbGHgzocfE1qlbwwTwV4uDoiQhz3cC0");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent"></div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="max-w-[480px] mx-auto w-full px-6">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-center pb-2 pt-8">
                One account for all campuses
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-8 pt-1 text-center">
                Join the largest student network. Quick &amp; Secure access with your phone.
            </p>
<!-- Login Form -->
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal px-1">Mobile Number</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">+91</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 h-14 pl-14 pr-4 text-base font-normal" placeholder="Enter your 10-digit number" type="tel"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-colors flex items-center justify-center gap-2">
<span>Send OTP</span>
<span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
<span class="text-slate-500 text-xs font-medium uppercase tracking-widest">or continue with</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-slate-800"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBOZREpa7lnzNNm-vmwmmuFt_2g4ueC1DpIm86VOPvnM_yfzyvhdqNXIT_bMoqWOrM5vuifj3KBfO2B097wGYlc7Ri_T5IgdIGvyLoHTuBKpkfYyLU-tsIh-aaNlznHQvbPvaKW4gbRaaCKKmfiN-hcvgni8VDtcHi_E-g8uFFRpkRm4G7sPJxSCJ30juGfQCx7juP1-r9KF6f9JN4Jc856uhdhdIjXctpzYqqmmTOYyBZ0zJEDkKh_fM2ob35NgcxOZHqkDxACEVM"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-primary text-[24px]">mail</span>
<span class="text-sm font-medium">Email</span>
</button>
</div>
<!-- Guest Login -->
<div class="mt-8 pb-12 flex flex-col items-center gap-4">
<button class="text-primary font-medium hover:underline flex items-center gap-1">
                    Continue as Guest
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<p class="text-slate-500 dark:text-slate-500 text-xs text-center max-w-[280px]">
                    By signing in, you agree to our <a class="underline" href="#">Terms</a> and <a class="underline" href="#">Privacy Policy</a>.
                </p>
</div>
</div>
</div>
</body></html>
